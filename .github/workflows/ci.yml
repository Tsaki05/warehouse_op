name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: magatzem_test
          POSTGRES_USER: magatzem
          POSTGRES_PASSWORD: magatzem
        # Optimització de memòria per a Postgres en entorns de test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # OPTIMITZACIÓ 1: Cache natiu de setup-python
          cache: 'pip'
          cache-dependency-path: 'backend/requirements/development.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/development.txt

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_ENV: development
          DB_NAME: magatzem_test
          DB_USER: magatzem
          DB_PASSWORD: magatzem
          DB_HOST: localhost
          DB_PORT: 5432
          DB_SCHEMA: public
        run: |
          cd backend
          # OPTIMITZACIÓ 2: Paral·lelisme i velocitat de Django
          # --parallel: Utilitza diversos nuclis (si els tests ho permeten)
          # --keepdb: (Opcional) Reutilitza la DB si fessis servir self-hosted runners
          python manage.py test --parallel