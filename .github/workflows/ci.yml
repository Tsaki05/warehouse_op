name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # JOB 1: ANALISI I TESTS DEL BACKEND
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: magatzem_test
          POSTGRES_USER: magatzem
          POSTGRES_PASSWORD: magatzem
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements/development.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/development.txt

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_ENV: development
          DB_NAME: magatzem_test
          DB_USER: magatzem
          DB_PASSWORD: magatzem
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py test --parallel

  # JOB 2: ANALISI I TESTS DEL FRONTEND
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # OPTIMITZACIÓ: Cache per a npm (node_modules)
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci # 'npm ci' és més ràpid i net en entorns de CI que 'npm install'

      - name: Lint (Anàlisi de codi)
        run: |
          cd frontend
          npm run lint # Això comprova que el codi segueixi les regles d'estil

      - name: Build (Comprovació de compilació)
        run: |
          cd frontend
          npm run build # Ens assegurem que el projecte compila correctament per a producció